<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mini Amazon - Multi-Vendor E-Commerce Marketplace. Shop from thousands of sellers, find the best deals on electronics, fashion, home goods, and more."
    />
    <meta
      name="keywords"
      content="ecommerce, marketplace, online shopping, multi-vendor, electronics, fashion, home goods, deals"
    />
    <meta name="author" content="Mini Amazon" />
    <meta name="theme-color" content="#ff9900" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Mini Amazon - Multi-Vendor E-Commerce Marketplace"
    />
    <meta
      property="og:description"
      content="Shop from thousands of sellers. Find the best deals on electronics, fashion, home goods, and more."
    />
    <meta property="og:site_name" content="Mini Amazon" />
    <meta property="og:locale" content="ar_SA" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Mini Amazon - Multi-Vendor E-Commerce Marketplace"
    />
    <meta
      name="twitter:description"
      content="Shop from thousands of sellers. Find the best deals on electronics, fashion, home goods, and more."
    />

    <!-- Mobile web app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Mini Amazon" />
    <meta name="format-detection" content="telephone=no" />

    <title>Mini Amazon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Mini Amazon",
        "description": "Multi-Vendor E-Commerce Marketplace",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "/?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
